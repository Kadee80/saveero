name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webapp

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: webapp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint --if-present || true

      - name: Run tests
        run: npm test -- --run --reporter=verbose
        env:
          VITE_API_URL: http://localhost:8000
          VITE_SUPABASE_URL: http://localhost:54321
          VITE_SUPABASE_ANON_KEY: test-key

      - name: Generate coverage report
        run: npm run test:coverage -- --run || true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        if: always()
        with:
          files: ./coverage/coverage-final.json
          flags: frontend
          name: frontend-coverage
          fail_ci_if_error: false

      - name: Comment PR with test results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let comment = '## Frontend Test Results\n\n';
            comment += '✅ Tests completed\n\n';
            comment += '- Node version: 18\n';
            comment += '- npm dependencies: installed and cached\n';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: saveero_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-cov pytest-asyncio

      - name: Install test dependencies
        run: pip install python-dotenv

      - name: Run backend tests
        run: pytest tests/ -v --cov --cov-report=xml --cov-report=html
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/saveero_test
          SUPABASE_URL: http://localhost:54321
          SUPABASE_SERVICE_ROLE_KEY: test-key
          OPENROUTER_API_KEY: test-key
          FRED_API_KEY: test-key
          JWT_SECRET: test-secret-key
          TESTING: 'true'

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        if: always()
        with:
          files: ./coverage.xml
          flags: backend
          name: backend-coverage
          fail_ci_if_error: false

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: backend-test-reports
          path: |
            htmlcov/
            .coverage
          retention-days: 7

      - name: Comment PR with test results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            let comment = '## Backend Test Results\n\n';
            comment += '✅ Tests completed\n\n';
            comment += '- Python version: 3.11\n';
            comment += '- Database: PostgreSQL 15\n';
            comment += '- Test framework: pytest\n';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [frontend-tests, backend-tests]
    if: always()

    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.frontend-tests.result }}" != "success" ] || [ "${{ needs.backend-tests.result }}" != "success" ]; then
            echo "::error::Some tests failed"
            exit 1
          fi

      - name: Comment PR with final summary
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const frontendStatus = '${{ needs.frontend-tests.result }}' === 'success' ? '✅' : '❌';
            const backendStatus = '${{ needs.backend-tests.result }}' === 'success' ? '✅' : '❌';
            const frontendResult = '${{ needs.frontend-tests.result }}';
            const backendResult = '${{ needs.backend-tests.result }}';

            const comment = '## Test Results Summary\n\n' +
              frontendStatus + ' Frontend Tests: ' + frontendResult + '\n' +
              backendStatus + ' Backend Tests: ' + backendResult + '\n\n' +
              'All tests must pass before merging.';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
